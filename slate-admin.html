<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slate Admin - ZABAL Gamez</title>
  <meta name="description" content="Admin tool to review and approve vote candidates from submissions.">
  <link rel="icon" type="image/png" href="/assets/icon.png">
  <meta name="theme-color" content="#070709">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/style.css">
  <style>
    .admin-header { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; margin-bottom: 1.5rem; }
    .admin-header h2 { margin: 0 0 0.5rem 0; font-size: 1.4rem; }
    .admin-header p { margin: 0.3rem 0; color: var(--text-dim); font-size: 0.9rem; }
    .admin-stats { display: flex; gap: 1.5rem; margin-top: 1rem; font-family: 'JetBrains Mono', monospace; font-size: 0.9rem; }
    .admin-stat { display: flex; flex-direction: column; }
    .admin-stat span:first-child { color: var(--gold); font-weight: 700; }
    .admin-stat span:last-child { color: var(--text-dim); font-size: 0.85rem; }

    .track-section { margin-bottom: 2rem; }
    .track-section h3 { color: var(--cyan); font-size: 1.1rem; margin-bottom: 0.8rem; text-transform: capitalize; }
    .track-empty { color: var(--text-dim); padding: 0.8rem; font-size: 0.9rem; }

    .candidate-row { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 0.9rem; margin-bottom: 0.6rem; display: flex; gap: 0.8rem; align-items: flex-start; }
    .candidate-row input[type="checkbox"] { margin-top: 0.3rem; cursor: pointer; width: 18px; height: 18px; }
    .candidate-info { flex: 1; min-width: 0; }
    .candidate-info h4 { margin: 0 0 0.3rem 0; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.95rem; }
    .candidate-info .handle { color: var(--cyan); font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; }
    .candidate-info .note { color: var(--text-dim); font-size: 0.8rem; margin-top: 0.2rem; }
    .candidate-info .status { display: inline-block; font-size: 0.75rem; padding: 0.15rem 0.4rem; border-radius: 4px; background: var(--surface-2); color: var(--text-dim); margin-top: 0.3rem; }
    .candidate-info .status.finalist { background: var(--zabal); color: var(--bg); }

    .needs-track-row { background: var(--surface); border: 1px solid var(--border-hover); border-left: 2px solid var(--gold); border-radius: 8px; padding: 0.9rem; margin-bottom: 0.6rem; }
    .needs-track-row h4 { margin: 0 0 0.5rem 0; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.95rem; }
    .needs-track-row .handle { color: var(--cyan); font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; }
    .needs-track-row .note { color: var(--text-dim); font-size: 0.8rem; margin: 0.3rem 0; }
    .needs-track-row .creator-type { color: var(--gold); font-size: 0.8rem; margin: 0.3rem 0; }
    .track-selector { display: flex; gap: 0.5rem; margin-top: 0.6rem; }
    .track-selector button { font-size: 0.8rem; padding: 0.4rem 0.7rem; border-radius: 6px; border: 1px solid var(--border); background: var(--surface-2); color: var(--text-dim); cursor: pointer; font-family: 'Outfit', sans-serif; }
    .track-selector button:hover { border-color: var(--cyan); color: var(--text); }
    .track-selector button.selected { border-color: var(--cyan); background: var(--cyan); color: var(--bg); }

    .controls { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; margin-top: 1.5rem; }
    .controls button { padding: 0.8rem 1.2rem; border-radius: 8px; border: none; font-size: 0.95rem; font-family: 'Syne', sans-serif; font-weight: 700; cursor: pointer; transition: all 0.2s; }
    .btn-primary { background: var(--cyan); color: var(--bg); }
    .btn-primary:hover { opacity: 0.85; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-secondary { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); margin-left: 0.5rem; }
    .btn-secondary:hover { border-color: var(--cyan); color: var(--cyan); }

    .output-section { margin-top: 1.5rem; }
    .output-code { background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; color: var(--text-dim); max-height: 300px; overflow-y: auto; word-break: break-all; white-space: pre-wrap; }
    .copy-btn { font-size: 0.8rem; padding: 0.4rem 0.7rem; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; color: var(--text-dim); cursor: pointer; margin-bottom: 0.5rem; }
    .copy-btn:hover { border-color: var(--cyan); color: var(--cyan); }

    .error { background: var(--surface); border: 1px solid var(--pink); border-radius: 8px; padding: 1rem; color: var(--pink); margin-top: 1rem; }
    .loading { text-align: center; color: var(--text-dim); padding: 2rem; }
  </style>
</head>
<body>
<nav class="nav">
  <div class="nav-row">
    <a href="/" class="nav-brand">ZABAL <span class="accent">GAMEZ</span></a>
    <div class="nav-links">
      <a href="/vote">Vote</a>
      <a href="/board">Board</a>
    </div>
  </div>
</nav>

<main>
  <div class="container">
    <div class="hero" style="padding-bottom: 1rem;">
      <div class="hero-eyebrow">Admin tool</div>
      <h1>Vote Slate <span class="accent">Review</span></h1>
      <p class="hero-sub">Review draft vote candidates from submissions. Assign tracks for ambiguous entries, then copy the merged JSON to commit to data/vote-candidates.json.</p>
    </div>

    <div id="app"></div>
  </div>
</main>

<script>
const ADMIN_KEY = localStorage.getItem('slate-admin-key') || '';
const BASE_URL = 'https://zabalgamez.com';

const app = document.getElementById('app');

async function loadDraft() {
  app.innerHTML = '<div class="loading">Loading draft...</div>';
  try {
    const r = await fetch(`${BASE_URL}/api/qv-slate-draft`, {
      headers: { Authorization: `Bearer ${ADMIN_KEY}` },
    });
    const data = await r.json();
    if (!data.ok) {
      if (data.error === 'forbidden') {
        promptAuth();
      } else {
        app.innerHTML = `<div class="error">Error: ${data.error || 'Unknown error'}</div>`;
      }
      return;
    }
    renderDraft(data);
  } catch (e) {
    app.innerHTML = `<div class="error">Failed to load draft: ${e.message}</div>`;
  }
}

function promptAuth() {
  const key = prompt('Enter ADMIN_KEY:', '');
  if (key) {
    localStorage.setItem('slate-admin-key', key);
    window.location.reload();
  } else {
    app.innerHTML = '<div class="error">Admin key required.</div>';
  }
}

function renderDraft(draft) {
  const { tracks, submission_count, candidate_count } = draft;
  const trackAssignments = {}; // handle -> assigned track (for _needs_track)

  let html = `
    <div class="admin-header">
      <h2>Draft Slate</h2>
      <p>Review candidates and assign tracks.</p>
      <div class="admin-stats">
        <div class="admin-stat">
          <span>${submission_count}</span>
          <span>submissions</span>
        </div>
        <div class="admin-stat">
          <span>${candidate_count}</span>
          <span>candidates (deduped)</span>
        </div>
      </div>
    </div>
  `;

  // Render tracks with candidates
  for (const track of ['artist', 'builder', 'creator']) {
    const candidates = tracks[track] || [];
    html += `<div class="track-section">
      <h3>${track}</h3>`;
    if (candidates.length === 0) {
      html += '<div class="track-empty">No candidates</div>';
    } else {
      for (const c of candidates) {
        html += `
          <div class="candidate-row" data-handle="${c.handle}">
            <input type="checkbox" class="select-candidate" checked>
            <div class="candidate-info">
              <h4>${c.name}</h4>
              <span class="handle">@${c.handle}</span>
              ${c.note ? `<div class="note">${c.note}</div>` : ''}
              <span class="status ${c.submission_status === 'finalist' ? 'finalist' : ''}">${c.submission_status}</span>
            </div>
          </div>
        `;
      }
    }
    html += '</div>';
  }

  // Render needs_track
  const needsTrack = tracks._needs_track || [];
  if (needsTrack.length > 0) {
    html += `<div class="track-section">
      <h3 style="color: var(--gold);">Needs Track Assignment</h3>`;
    for (const c of needsTrack) {
      html += `
        <div class="needs-track-row" data-handle="${c.handle}">
          <h4>${c.name}</h4>
          <span class="handle">@${c.handle}</span>
          <div class="note">${c.note}</div>
          <div class="creator-type">Type: ${c.creator_type}</div>
          <div class="track-selector">
            <button class="track-btn" data-track="artist" data-handle="${c.handle}">Artist</button>
            <button class="track-btn" data-track="builder" data-handle="${c.handle}">Builder</button>
            <button class="track-btn" data-track="creator" data-handle="${c.handle}">Creator</button>
          </div>
        </div>
      `;
    }
    html += '</div>';
  }

  html += `
    <div class="controls">
      <button class="btn-primary" onclick="generateSlate()">Generate Merged JSON</button>
      <button class="btn-secondary" onclick="location.reload()">Refresh</button>
    </div>
    <div id="output-section"></div>
  `;

  app.innerHTML = html;

  // Attach track selector handlers
  document.querySelectorAll('.track-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      const handle = e.target.dataset.handle;
      const track = e.target.dataset.track;
      trackAssignments[handle] = track;
      document.querySelectorAll(`.track-btn[data-handle="${handle}"]`).forEach(b => b.classList.remove('selected'));
      e.target.classList.add('selected');
    });
  });

  window.generateSlate = async () => {
    const TRACKS = ['artist', 'builder', 'creator'];

    // Load the live curated slate FIRST so its existing candidates are never wiped.
    // The generated JSON is a union of (existing curated) + (newly selected), deduped
    // by handle within each track, existing winning on conflict (keeps hand-curated
    // notes/urls). If this fetch fails we refuse to generate rather than silently drop
    // the live slate.
    let existing = null;
    try {
      const r = await fetch('/data/vote-candidates.json', { cache: 'no-store' });
      if (r.ok) existing = await r.json();
    } catch (e) { existing = null; }

    const output = document.getElementById('output-section');
    if (!existing || typeof existing !== 'object' || !existing.tracks) {
      output.innerHTML = `
        <div class="output-section">
          <p style="color: var(--gold);">Could not load the current /data/vote-candidates.json.
          Refusing to generate a slate that might drop existing curated candidates.
          Check the file is reachable, then try again.</p>
        </div>
      `;
      return;
    }

    const out = {};
    const seen = {};
    let existingCount = 0;
    let addedCount = 0;

    // 1) Preserve every existing curated entry (existing wins on handle conflict).
    for (const track of TRACKS) {
      out[track] = [];
      seen[track] = new Set();
      for (const c of (existing.tracks[track] || [])) {
        if (!c || !c.handle || seen[track].has(c.handle)) continue;
        seen[track].add(c.handle);
        out[track].push(c);
        existingCount++;
      }
    }

    // 2) Add newly-selected submission candidates, skipping handles already present.
    for (const track of TRACKS) {
      document.querySelectorAll(`.candidate-row[data-handle]`).forEach(row => {
        if (!row.querySelector('.select-candidate').checked) return;
        const handle = row.dataset.handle;
        const candidate = (tracks[track] || []).find(c => c.handle === handle);
        if (candidate && !seen[track].has(candidate.handle)) {
          seen[track].add(candidate.handle);
          out[track].push({ handle: candidate.handle, name: candidate.name, url: candidate.url, note: candidate.note });
          addedCount++;
        }
      });
    }

    // 3) needs_track assignments (also deduped against existing).
    for (const c of (tracks._needs_track || [])) {
      const assigned = trackAssignments[c.handle];
      if (assigned && out[assigned] && !seen[assigned].has(c.handle)) {
        seen[assigned].add(c.handle);
        out[assigned].push({ handle: c.handle, name: c.name, url: c.url, note: c.note });
        addedCount++;
      }
    }

    // Preserve the live status field. Opening voting stays a separate, explicit human
    // decision (edit status to 'open' in the PR) - this tool never flips it.
    const liveStatus = existing.status || 'preview';
    const merged = {
      version: existing.version || 1,
      _schema: existing._schema || draft._schema || "Curated candidate slate for the quadratic vote.",
      status: liveStatus,
      tracks: out,
    };

    const json = JSON.stringify(merged, null, 2);
    output.innerHTML = `
      <div class="output-section">
        <p style="color: var(--text-dim); font-size: 0.9rem;">
          Preserved ${existingCount} existing + added ${addedCount} new = ${existingCount + addedCount} candidates.
          Live status is <code>${escapeHtml(liveStatus)}</code> (unchanged - opening voting is a separate step).
          Commit this to <code>data/vote-candidates.json</code> via a PR:
        </p>
        <button class="copy-btn" onclick="copyToClipboard()">Copy to Clipboard</button>
        <div class="output-code" id="output-code">${escapeHtml(json)}</div>
      </div>
    `;
    window.slateJson = json;
  };
}

function copyToClipboard() {
  if (window.slateJson) {
    navigator.clipboard.writeText(window.slateJson).then(() => {
      alert('Copied. Open a PR that replaces data/vote-candidates.json with this - do not push to main.');
    }).catch(() => {
      alert('Failed to copy. Select the JSON manually.');
    });
  }
}

function escapeHtml(text) {
  const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
  return text.replace(/[&<>"']/g, m => map[m]);
}

// Check for auth on load
if (!ADMIN_KEY) {
  promptAuth();
} else {
  loadDraft();
}
</script>
</body>
</html>
